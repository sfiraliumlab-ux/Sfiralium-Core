<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfiralium Core - 3D Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; }
        #canvas-container { width: 100vw; height: 100vh; }
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            font-family: 'Courier New', monospace;
            max-width: 400px;
            z-index: 100;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #38bdf8;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Загрузка 3D движка...</div>
    <div id="canvas-container"></div>
    
    <div class="info-panel">
        <h2 class="text-xl font-bold mb-2 text-purple-400">Sfiralium Core</h2>
        <p class="text-sm mb-2">3D визуализация сфиральной структуры</p>
        <div class="text-xs space-y-1">
            <p>• Зеркальная антисимметрия</p>
            <p>• S-образный переход</p>
            <p>• Фрактальная геометрия</p>
            <p class="mt-2 text-sky-300">Вращение: автоматическое</p>
            <p class="text-sky-300">Масштаб: 0.5 (оптимизировано)</p>
        </div>
    </div>

    <script>
        // Убираем сообщение о загрузке
        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
        });

        // Инициализация Three.js
        let scene, camera, renderer, sfiraliumGroup;
        let animationId;

        function init() {
            try {
                // Сцена
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0f172a);
                scene.fog = new THREE.Fog(0x0f172a, 10, 50);

                // Камера
                camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 0, 15);

                // Рендерер
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                // Освещение
                const ambientLight = new THREE.AmbientLight(0x404040, 2);
                scene.add(ambientLight);

                const pointLight1 = new THREE.PointLight(0x38bdf8, 2, 50);
                pointLight1.position.set(10, 10, 10);
                scene.add(pointLight1);

                const pointLight2 = new THREE.PointLight(0xa855f7, 2, 50);
                pointLight2.position.set(-10, -10, 10);
                scene.add(pointLight2);

                // Создаем сфиральную структуру
                createSfiraliumStructure();

                // Обработчик изменения размера окна
                window.addEventListener('resize', onWindowResize);

                // Запуск анимации
                animate();

                console.log('Three.js инициализирован успешно');
            } catch (error) {
                console.error('Ошибка инициализации Three.js:', error);
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.textContent = 'Ошибка загрузки 3D: ' + error.message;
                    loading.style.color = '#ef4444';
                }
            }
        }

        function createSfiraliumStructure() {
            sfiraliumGroup = new THREE.Group();

            // Параметры для генерации точек (как в Blender скрипте)
            const segments = 128;
            const radius = 2.5; // Уменьшено с 5 до 2.5 для лучшего масштабирования
            const coilHeight = 1.5;
            
            // Массивы для хранения точек
            const leftCoilPoints = [];
            const rightCoilPoints = [];
            const sCurvePoints = [];

            // Генерация основного витка (левая сторона)
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const angle = t * Math.PI * 2;
                
                // Основная спираль
                const x = -radius * Math.cos(angle);
                const y = -radius * Math.sin(angle);
                const z = (t - 0.5) * coilHeight;
                
                leftCoilPoints.push(new THREE.Vector3(x, y, z));
                
                // Правая сторона (зеркальная антисимметрия)
                const xRight = radius * Math.cos(angle);
                const yRight = radius * Math.sin(angle);
                const zRight = (t - 0.5) * coilHeight;
                
                rightCoilPoints.push(new THREE.Vector3(xRight, yRight, zRight));
            }

            // Генерация S-образного перехода
            const sSegments = 32;
            for (let i = 0; i <= sSegments; i++) {
                const t = i / sSegments;
                
                // S-кривая (сигмоида)
                const sCurve = 2 * t - 1;
                const x = 0;
                const y = radius * sCurve;
                const z = (t - 0.5) * coilHeight * 0.5;
                
                sCurvePoints.push(new THREE.Vector3(x, y, z));
            }

            // Материалы
            const leftMaterial = new THREE.LineBasicMaterial({ 
                color: 0x38bdf8,
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });

            const rightMaterial = new THREE.LineBasicMaterial({ 
                color: 0xa855f7,
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });

            const sCurveMaterial = new THREE.LineBasicMaterial({ 
                color: 0xffffff,
                linewidth: 3,
                transparent: true,
                opacity: 0.9
            });

            // Создаем линии
            const leftGeometry = new THREE.BufferGeometry().setFromPoints(leftCoilPoints);
            const leftLine = new THREE.Line(leftGeometry, leftMaterial);
            sfiraliumGroup.add(leftLine);

            const rightGeometry = new THREE.BufferGeometry().setFromPoints(rightCoilPoints);
            const rightLine = new THREE.Line(rightGeometry, rightMaterial);
            sfiraliumGroup.add(rightLine);

            const sCurveGeometry = new THREE.BufferGeometry().setFromPoints(sCurvePoints);
            const sCurveLine = new THREE.Line(sCurveGeometry, sCurveMaterial);
            sfiraliumGroup.add(sCurveLine);

            // Добавляем светящиеся точки в ключевых позициях
            addGlowingPoints();

            // Добавляем группу в сцену
            scene.add(sfiraliumGroup);

            console.log('Сфиральная структура создана');
        }

        function addGlowingPoints() {
            // Создаем светящиеся сферы в ключевых точках
            const pointGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            
            // Левая точка
            const leftMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x38bdf8,
                transparent: true,
                opacity: 0.9
            });
            const leftPoint = new THREE.Mesh(pointGeometry, leftMaterial);
            leftPoint.position.set(-2.5, 0, 0);
            sfiraliumGroup.add(leftPoint);

            // Правая точка
            const rightMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xa855f7,
                transparent: true,
                opacity: 0.9
            });
            const rightPoint = new THREE.Mesh(pointGeometry, rightMaterial);
            rightPoint.position.set(2.5, 0, 0);
            sfiraliumGroup.add(rightPoint);

            // Центральная точка (S-переход)
            const centerMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffffff,
                transparent: true,
                opacity: 1
            });
            const centerPoint = new THREE.Mesh(pointGeometry, centerMaterial);
            centerPoint.position.set(0, 0, 0);
            sfiraliumGroup.add(centerPoint);

            // Добавляем свечение (emissive effect) через дополнительные сферы
            const glowGeometry = new THREE.SphereGeometry(0.25, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x38bdf8,
                transparent: true,
                opacity: 0.3
            });
            const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
            glowMesh.position.set(0, 0, 0);
            sfiraliumGroup.add(glowMesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            // Вращение сфиральной структуры
            if (sfiraliumGroup) {
                sfiraliumGroup.rotation.x += 0.003;
                sfiraliumGroup.rotation.y += 0.005;
            }

            renderer.render(scene, camera);
        }

        // Инициализация при загрузке страницы
        window.addEventListener('DOMContentLoaded', init);

        // Очистка при закрытии страницы
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            if (renderer) {
                renderer.dispose();
            }
        });
    </script>
</body>
</html>
